services:
  - type: web
    name: product-advisor-api
    runtime: docker
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL_NAME
        value: gpt-5.4-nano
      - key: ALLOWED_ORIGINS
        sync: false
